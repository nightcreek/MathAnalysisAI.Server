model_list:
  - model_name: math-reviewer
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: math-solver
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: math-hint
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: math-explainer
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: photo-solution-ocr
    litellm_params:
      # Primary route (domestic-first): DashScope / Qwen-VL via OpenAI-compatible endpoint.
      # Keep this alias stable for backend calls; switch upstream provider here only.
      model: openai/qwen-vl-plus
      api_key: os.environ/DASHSCOPE_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1

