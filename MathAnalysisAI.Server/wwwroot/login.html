<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 数学分析智能体</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="login-centered" id="loginPageRoot">
    <div class="login-card">
        <h2>数学分析智能体</h2>
        <p class="login-brand-sub">MathAnalysisAI</p>

        <div class="mode-switch" id="loginModeSwitch">
            <button class="mode-switch-btn is-active" data-tab="login">登录</button>
            <button class="mode-switch-btn" data-tab="register">注册</button>
        </div>

        <div id="loginSection">
            <p id="loginPageHint">登录后可使用学习分析、拍照解题等功能。</p>
            <div class="form-grid">
                <div class="full">
                    <label for="loginUsernameInput">用户名</label>
                    <input id="loginUsernameInput" type="text" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="full" id="passwordFieldGroup" style="display:none">
                    <label for="loginPasswordInput">密码</label>
                    <div class="password-input-wrapper">
                        <input id="loginPasswordInput" type="password" placeholder="请输入密码" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="loginPasswordToggle" aria-label="显示密码" tabindex="-1">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="actions">
                <button id="loginSubmitBtn">登录</button>
                <span id="loginStatus" class="status"></span>
            </div>
            <div id="loginUserInfo" class="hint"></div>
        </div>

        <div id="registerSection" style="display:none">
            <p class="hint">输入用户名和密码即可注册。姓名和学号可选，之后可加入班级再补充。</p>
            <div class="form-grid">
                <div class="full">
                    <label for="registerUsernameInput">用户名</label>
                    <input id="registerUsernameInput" type="text" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="full">
                    <label for="registerPasswordInput">密码</label>
                    <div class="password-input-wrapper">
                        <input id="registerPasswordInput" type="password" placeholder="请输入密码（至少4位）" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="registerPasswordToggle" aria-label="显示密码" tabindex="-1">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="half">
                    <label for="registerRealNameInput">真实姓名（选填）</label>
                    <input id="registerRealNameInput" type="text" placeholder="姓名">
                </div>
                <div class="half">
                    <label for="registerStudentNumberInput">学号（选填）</label>
                    <input id="registerStudentNumberInput" type="text" placeholder="学号">
                </div>
            </div>
            <div class="actions">
                <button id="registerSubmitBtn">注册</button>
                <span id="registerStatus" class="status"></span>
            </div>
        </div>

        <div id="modeInfoSection" style="display:none">
            <div class="section-title">当前认证模式</div>
            <div id="modeInfoContent" class="hint"></div>
        </div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
