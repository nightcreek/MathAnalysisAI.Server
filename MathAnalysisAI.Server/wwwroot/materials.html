<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>课程资料 - 数学分析智能体</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
<div class="container">
    <nav class="top-nav" aria-label="主导航"></nav>

    <div class="hero hero-left">
        <h1>课程资料</h1>
        <p>浏览教师上传的课程资料、章节解析与外部学习资源。学生端默认以只读模式展示。</p>
    </div>

    <div class="card">
        <div class="mode-switch" role="tablist" aria-label="资料视图切换">
            <button class="mode-switch-btn is-active" data-materials-view="list" type="button">课程资料</button>
            <button class="mode-switch-btn" data-materials-view="resources" type="button">网络资源</button>
        </div>
    </div>

    <div id="materialsListArea" class="card materials-pane is-active" data-materials-pane="list">
        <div class="section-title">已上传资料</div>
        <div class="materials-filter-grid">
            <div>
                <label for="materialsListChapterSelect">章节</label>
                <select id="materialsListChapterSelect">
                    <option value="">全部章节</option>
                </select>
            </div>
            <div>
                <label for="materialsListStatusSelect">解析状态</label>
                <select id="materialsListStatusSelect">
                    <option value="">全部状态</option>
                    <option value="success">解析成功</option>
                    <option value="processing">解析中</option>
                    <option value="pending">等待解析</option>
                    <option value="failed">解析失败</option>
                    <option value="ocr_pending">需要 OCR</option>
                </select>
            </div>
            <div class="materials-filter-actions">
                <button id="materialsRefreshBtn">刷新</button>
                <span id="materialsListStatus" class="status"></span>
            </div>
        </div>
        <div id="materialsListContainer" class="status">加载中…</div>
    </div>

    <div id="materialsResourcesArea" class="card materials-pane" data-materials-pane="resources" style="display:none;">
        <div class="section-title">网络资源</div>
        <p class="hint">以下为与课程相关的推荐外部学习资源。按分类浏览，点击卡片前往对应站点查看原始内容。</p>
        <div id="networkResourcesGrid" class="usage-grid"></div>
    </div>
</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api/compiled-contracts.js"></script>
<script src="/js/api/contracts.js"></script>
<script src="/js/api/contractValidator.js"></script>
<script src="/js/api/endpoints.js"></script>
<script src="/js/api/apiClient.js"></script>
<script src="/js/api/authApi.js"></script>
<script src="/js/api/analysisApi.js"></script>
<script src="/js/api/adminApi.js"></script>
<script src="/js/api/resourcesApi.js"></script>
<script src="/js/api/questionApi.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/materials.js"></script>
</body>
</html>
