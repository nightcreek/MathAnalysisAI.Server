<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>资料上传管理 - 数学分析智能体</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
<div class="container">
    <nav class="top-nav" aria-label="主导航"></nav>

    <div class="hero hero-left">
        <h1>资料上传管理</h1>
        <p>上传 PDF 课程资料并进行管理。仅教师和管理员可访问。</p>
    </div>

    <div id="materialsManagerArea">
    <div class="card">
        <div class="section-title">上传资料</div>
        <div class="form-grid">
            <div class="full">
                <label for="materialTitleInput">资料标题</label>
                <input id="materialTitleInput" type="text" placeholder="例如：数学分析教材（上册）第七章反常积分">
            </div>
            <div>
                <label for="materialChapterSelect">章节</label>
                <select id="materialChapterSelect">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div>
                <label for="materialKindSelect">资料类型</label>
                <select id="materialKindSelect">
                    <option value="textbook" selected>教材</option>
                    <option value="lecture_note">讲义</option>
                    <option value="exercise_book">习题册</option>
                    <option value="handout">资料</option>
                    <option value="user_note">个人笔记</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <div class="full">
                <label for="materialPdfFile">PDF 文件</label>
                <input id="materialPdfFile" type="file" accept=".pdf,application/pdf">
            </div>
        </div>
        <div class="actions">
            <button id="uploadMaterialBtn">上传资料</button>
            <span id="uploadMaterialStatus" class="status"></span>
        </div>
    </div>

    <div class="card">
        <div class="section-title">上传结果</div>
        <div id="materialsUploadResult" class="status">暂无上传结果</div>
    </div>
    </div>

    <div id="materialsListArea" class="card">
        <div class="section-title">已上传资料</div>
        <div class="materials-filter-grid">
            <div>
                <label for="materialsListChapterSelect">章节</label>
                <select id="materialsListChapterSelect">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div>
                <label for="materialsListStatusSelect">解析状态</label>
                <select id="materialsListStatusSelect">
                    <option value="">全部状态</option>
                    <option value="success">解析成功</option>
                    <option value="processing">解析中</option>
                    <option value="pending">等待解析</option>
                    <option value="failed">解析失败</option>
                    <option value="ocr_pending">需要 OCR</option>
                </select>
            </div>
            <div class="materials-filter-actions">
                <button id="materialsRefreshBtn">刷新</button>
                <span id="materialsListStatus" class="status"></span>
            </div>
        </div>
        <div id="materialsListContainer" class="status">加载中...</div>
    </div>
</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api/compiled-contracts.js"></script>
<script src="/js/api/contracts.js"></script>
<script src="/js/api/contractValidator.js"></script>
<script src="/js/api/endpoints.js"></script>
<script src="/js/api/apiClient.js"></script>
<script src="/js/api/authApi.js"></script>
<script src="/js/api/analysisApi.js"></script>
<script src="/js/api/adminApi.js"></script>
<script src="/js/api/resourcesApi.js"></script>
<script src="/js/api/questionApi.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/materials.js"></script>
</body>
</html>
