<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学习统计 - 数学分析智能体</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
            integrity="sha256-BmtB4uom5IJhNrR9TkjBwfW5C/w4yR/m7GHkZRw4tU="
            crossorigin="anonymous"></script>
</head>
<body>
<div class="app-shell">
<div class="container" id="statsPageRoot">
    <div id="statsNavContainer"></div>

    <div class="hero hero-left">
        <h1>学习统计</h1>
        <p>查看学习练习统计与知识点掌握情况。</p>
    </div>

    <div class="card">
        <div class="section-title">学习概览</div>
        <div id="statsCourseSelectContainer" style="margin-bottom:12px;"><label>选择课程</label><select id="statsCourseSelect"><option value="">全部课程</option></select></div>
        <div id="statsCurrentUserHint" class="hint"></div>
        <div id="personalSummaryContainer" class="stats-summary-grid">
            <div class="hint">加载中...</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">知识点掌握度</div>
        <div id="statsRadarHint" class="hint">请登录后查看个人知识点掌握情况。</div>
        <div class="chart-container">
            <canvas id="knowledgeRadarChart" style="max-height:400px;"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="section-title">课程进度</div>
        <div id="courseProgressContainer" class="hint">加载中...</div>
    </div>

</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/stats.js"></script>
</body>
</html>
