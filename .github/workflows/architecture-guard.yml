name: Architecture Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  architecture-guard:
    name: Architecture Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore server solution
        run: dotnet restore MathAnalysisAI.Server/MathAnalysisAI.Server.sln

      - name: Build server
        run: dotnet build MathAnalysisAI.Server/MathAnalysisAI.Server.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MathAnalysisAI.Server/MathAnalysisAI.Server.sln --no-build

      - name: Run legacy architecture guard (observation)
        continue-on-error: true
        run: |
          chmod +x MathAnalysisAI.Server/scripts/architecture-guard.sh
          MathAnalysisAI.Server/scripts/architecture-guard.sh

      - name: Print legacy architecture violations
        if: always()
        run: |
          if [ -f architecture-violations.json ]; then
            cat architecture-violations.json
          else
            echo "architecture-violations.json not found"
          fi

      - name: Upload legacy architecture violations artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-violations
          path: architecture-violations.json
          if-no-files-found: ignore

      - name: Build module contract validator
        run: dotnet build Architecture/ModuleContracts/Architecture.ModuleContracts.csproj

      - name: Run module contract validator (observation)
        run: |
          dotnet run --project Architecture/ModuleContracts/Architecture.ModuleContracts.csproj -- \
            Architecture/ModuleContracts/module-contracts.json \
            module-contract-violations.json

      - name: Print module contract violations
        if: always()
        run: |
          if [ -f module-contract-violations.json ]; then
            cat module-contract-violations.json
          else
            echo "module-contract-violations.json not found"
          fi

      - name: Upload module contract violations artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-contract-violations
          path: module-contract-violations.json
          if-no-files-found: error

      - name: Run module contract validator (strict blocking rules)
        run: |
          dotnet run --project Architecture/ModuleContracts/Architecture.ModuleContracts.csproj -- \
            Architecture/ModuleContracts/module-contracts.json \
            module-contract-violations.json \
            --strict

      - name: Build contract validator
        run: dotnet build Architecture/ContractValidator/Architecture.ContractValidator.csproj

      - name: Run contract validator
        run: |
          dotnet run --project Architecture/ContractValidator/Architecture.ContractValidator.csproj -- \
            Contracts/api.contract.json \
            contract-mismatches.json

      - name: Print contract mismatches
        if: always()
        run: |
          if [ -f contract-mismatches.json ]; then
            cat contract-mismatches.json
          else
            echo "contract-mismatches.json not found"
          fi

      - name: Upload contract mismatches artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-mismatches
          path: contract-mismatches.json
          if-no-files-found: error

      - name: Build contract compiler
        run: dotnet build Architecture/ContractCompiler/Architecture.ContractCompiler.csproj

      - name: Run contract compiler
        run: |
          dotnet run --project Architecture/ContractCompiler/Architecture.ContractCompiler.csproj -- \
            Contracts/api.contract.json \
            MathAnalysisAI.Server/wwwroot/js/api/compiled-contracts.js

      - name: Upload compiled frontend contracts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-frontend-contracts
          path: MathAnalysisAI.Server/wwwroot/js/api/compiled-contracts.js
          if-no-files-found: error

      - name: Build architecture freeze validator
        run: dotnet build Architecture/Freeze/Architecture.Freeze.csproj

      - name: Run architecture freeze validator (observation)
        run: |
          dotnet run --project Architecture/Freeze/Architecture.Freeze.csproj -- \
            architecture-drift-report.json \
            dependency-graph.json \
            intelligence-isolation-report.json

      - name: Print architecture drift report
        if: always()
        run: |
          if [ -f architecture-drift-report.json ]; then
            cat architecture-drift-report.json
          else
            echo "architecture-drift-report.json not found"
          fi

      - name: Print dependency graph report
        if: always()
        run: |
          if [ -f dependency-graph.json ]; then
            cat dependency-graph.json
          else
            echo "dependency-graph.json not found"
          fi

      - name: Print intelligence isolation report
        if: always()
        run: |
          if [ -f intelligence-isolation-report.json ]; then
            cat intelligence-isolation-report.json
          else
            echo "intelligence-isolation-report.json not found"
          fi

      - name: Upload architecture freeze artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-freeze-artifacts
          path: |
            architecture-drift-report.json
            dependency-graph.json
            intelligence-isolation-report.json
          if-no-files-found: error

      - name: Run architecture freeze validator (strict)
        run: |
          dotnet run --project Architecture/Freeze/Architecture.Freeze.csproj -- \
            architecture-drift-report.json \
            dependency-graph.json \
            intelligence-isolation-report.json \
            --strict
