<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手动分析 - 数学分析智能体</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container">
    <nav class="top-nav" aria-label="主导航">
        <a class="top-nav-link" href="/index.html">首页</a>
        <a class="top-nav-link" href="/analysis.html">手动分析</a>
        <a class="top-nav-link" href="/ocr.html">拍照识别</a>
        <a class="top-nav-link" href="/materials.html">课程资料</a>
        <a class="top-nav-link" href="/stats.html">学习统计</a>
        <a class="top-nav-link nav-dev" href="/dev.html">开发工具</a>
    </nav>

    <div class="hero hero-left">
        <h1>手动分析</h1>
        <p>适合直接输入题目和解答的场景。不会调用 OCR，也不会自动跳转其他页面。</p>
    </div>

    <div class="card">
        <div class="section-title">开始分析</div>
        <div class="form-grid">
            <div>
                <label for="chapterSelect">章节</label>
                <select id="chapterSelect">
                    <option value="307" selected>反常积分</option>
                    <option value="301">极限</option>
                    <option value="302">连续</option>
                    <option value="303">导数与微分</option>
                    <option value="304">微分中值定理</option>
                    <option value="305">不定积分</option>
                    <option value="306">定积分</option>
                    <option value="308">数项级数</option>
                    <option value="309">函数列与函数项级数</option>
                    <option value="310">幂级数</option>
                    <option value="311">多元函数微分学</option>
                </select>
            </div>
            <div>
                <label for="modeSelect">分析模式</label>
                <select id="modeSelect">
                    <option value="review_solution" selected>批改学生解答</option>
                    <option value="hint">只给提示</option>
                    <option value="solve">标准解答</option>
                    <option value="concept_explain">概念讲解</option>
                </select>
            </div>
            <div class="full">
                <label for="problemTextInput">题目</label>
                <textarea id="problemTextInput" placeholder="请输入数学分析题目，例如：判断反常积分 ∫_1^∞ 1/x^2 dx 是否收敛。"></textarea>
            </div>
            <div class="full">
                <label for="studentSolutionTextInput">我的解答</label>
                <textarea id="studentSolutionTextInput" placeholder="请输入你的解题过程，系统会指出其中的问题。"></textarea>
            </div>
        </div>
        <div class="actions">
            <button id="analyzeBtn" onclick="analyzeText()">开始分析</button>
            <span id="analyzeStatus" class="status"></span>
        </div>
        <div id="currentUserHint" class="hint"></div>
    </div>

    <div class="card">
        <div class="section-title">分析结果</div>
        <div id="resultContainer" class="status">暂无结果</div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/knowledge-points.js"></script>
<script src="/js/analysis.js"></script>
</body>
</html>
