<!DOCTYPE html>
<html>
<head>
    <meta charset="gbk">
    <title>错题本</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: "Segoe UI", "微软雅黑";
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .img-box {
            text-align: center;
        }

            .img-box img {
                max-width: 100%;
                border-radius: 6px;
            }

        .section-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .analysis {
            background: #fafafa;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }

        button {
            margin-top: 10px;
            padding: 6px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

            button:hover {
                background: #0056b3;
            }

        .field {
            margin-bottom: 12px;
        }

        .field-label {
            font-weight: 600;
            color: #333;
        }

        .field-content {
            margin-left: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的AI错题本</h1>
        <div id="list">加载中...</div>
    </div>

    <script>
        async function loadQuestions() {
            var res = await fetch("/api/Question/list");
            var data = await res.json();
            var html = "";

            data.forEach(function (q) {
                var displayLatex = q.cleanLatex || "";
                // 过滤掉OCR日志
                if (displayLatex.indexOf("Loading") !== -1 || displayLatex.indexOf("ONNX") !== -1) {
                    displayLatex = "";
                }

                html +=
                    '<div class="card">' +
                    '<div class="img-box">' +
                    '<img src="' + q.imagePath + '" alt="题目图片">' +
                    '</div>' +
                    '<div class="section-title">识别结果：</div>' +
                    '<div>$$' + (displayLatex || "（无）") + '$$</div>' +
                    '<button onclick="analyze(' + q.id + ')">AI分析</button>' +
                    '<div id="ai-' + q.id + '" class="analysis"></div>' +
                    '</div>';
            });

            document.getElementById("list").innerHTML = html;
            if (window.MathJax) {
                MathJax.typeset();
            }
        }

        async function analyze(id) {
            var div = document.getElementById("ai-" + id);
            div.innerHTML = "分析中...";

            var res = await fetch("/api/Question/analyze/" + id, { method: "POST" });
            if (!res.ok) {
                div.innerHTML = "分析失败，请稍后重试";
                return;
            }

            var result = await res.json();

            div.innerHTML =
                '<div class="field"><span class="field-label">整体评价：</span><span class="field-content">' + (result.overallEvaluation || '') + '</span></div>' +
                '<div class="field"><span class="field-label">知识点：</span><span class="field-content">' + (result.knowledgePoint || '') + '</span></div>' +
                '<div class="field"><span class="field-label">学生答案：</span><span class="field-content">' + (result.studentAnswer || '') + '</span></div>' +
                '<div class="field"><span class="field-label">错误分析：</span><span class="field-content">' + (result.errorAnalysis || '') + '</span></div>' +
                '<div class="field"><span class="field-label">标准解答：</span><span class="field-content">' + (result.standardSolution || '') + '</span></div>' +
                '<div class="field"><span class="field-label">改进建议：</span><span class="field-content">' + (result.improvementSuggestion || '') + '</span></div>';

            if (window.MathJax) {
                MathJax.typeset();
            }
        }

        loadQuestions();
    </script>
</body>
</html>
